name: Build macOS

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build-macos-arm:
    runs-on: macos-latest   # Apple Silicon (arm64)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: brew install pkgconf librsvg

      - name: Install fyne CLI
        run: go install fyne.io/fyne/v2/cmd/fyne@latest

      - name: Create .icns icon
        run: |
          mkdir -p AppIcon.iconset
          for size in 16 32 64 128 256 512 1024; do
            rsvg-convert -w $size -h $size design/icon.svg > AppIcon.iconset/icon_${size}x${size}.png
          done
          cp AppIcon.iconset/icon_32x32.png   AppIcon.iconset/icon_16x16@2x.png
          cp AppIcon.iconset/icon_64x64.png   AppIcon.iconset/icon_32x32@2x.png
          cp AppIcon.iconset/icon_256x256.png AppIcon.iconset/icon_128x128@2x.png
          cp AppIcon.iconset/icon_512x512.png AppIcon.iconset/icon_256x256@2x.png
          cp AppIcon.iconset/icon_1024x1024.png AppIcon.iconset/icon_512x512@2x.png
          iconutil -c icns AppIcon.iconset -o design/icon.icns

      - name: Package .app bundle
        run: fyne package -os darwin -icon design/icon.icns -name "Svema Uploader" -appID com.svema.uploader -tags prod

      - name: Zip .app
        run: zip -r svema_uploader_macos_arm64.zip "Svema Uploader.app"

      - uses: actions/upload-artifact@v4
        with:
          name: svema_uploader_macos_arm64
          path: svema_uploader_macos_arm64.zip
