name: Release

on:
  push:
    tags: ['v*', '[0-9]*']

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev xorg-dev
      - name: Build
        run: go build -tags prod -o svema_uploader_linux .
      - uses: actions/upload-artifact@v4
        with:
          name: svema_uploader_linux
          path: svema_uploader_linux

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Install GCC (MinGW)
        run: choco install mingw -y
      - name: Install goversioninfo
        run: go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest
      - name: Generate resource.syso
        run: goversioninfo -icon=design/icon.ico -o resource.syso
        shell: bash
      - name: Build
        run: go build -tags prod -o svema_uploader_windows.exe .
      - uses: actions/upload-artifact@v4
        with:
          name: svema_uploader_windows
          path: svema_uploader_windows.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Install dependencies
        run: brew install pkgconf librsvg
      - name: Install fyne CLI
        run: go install fyne.io/fyne/v2/cmd/fyne@latest
      - name: Create .icns icon
        run: |
          mkdir -p AppIcon.iconset
          for size in 16 32 64 128 256 512 1024; do
            rsvg-convert -w $size -h $size design/icon.svg > AppIcon.iconset/icon_${size}x${size}.png
          done
          cp AppIcon.iconset/icon_32x32.png    AppIcon.iconset/icon_16x16@2x.png
          cp AppIcon.iconset/icon_64x64.png    AppIcon.iconset/icon_32x32@2x.png
          cp AppIcon.iconset/icon_256x256.png  AppIcon.iconset/icon_128x128@2x.png
          cp AppIcon.iconset/icon_512x512.png  AppIcon.iconset/icon_256x256@2x.png
          cp AppIcon.iconset/icon_1024x1024.png AppIcon.iconset/icon_512x512@2x.png
          iconutil -c icns AppIcon.iconset -o design/icon.icns
      - name: Package .app bundle
        run: fyne package -os darwin -icon design/icon.icns -name "Svema Uploader" -appID com.svema.uploader -tags prod
      - name: Zip .app
        run: zip -r svema_uploader_macos_arm64.zip "Svema Uploader.app"
      - uses: actions/upload-artifact@v4
        with:
          name: svema_uploader_macos_arm64
          path: svema_uploader_macos_arm64.zip

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: svema_uploader_linux
      - uses: actions/download-artifact@v4
        with:
          name: svema_uploader_windows
      - uses: actions/download-artifact@v4
        with:
          name: svema_uploader_macos_arm64
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            svema_uploader_linux
            svema_uploader_windows.exe
            svema_uploader_macos_arm64.zip
          generate_release_notes: true
